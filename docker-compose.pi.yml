services:
  app:
    build: .
    container_name: skippingstones
    env_file: .env
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - web
    volumes:
      - ./logs:/app/logs

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DUCKDNS_HOSTNAME=${DUCKDNS_HOSTNAME}
      - STATUS_HOSTNAME=${STATUS_HOSTNAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app
      - uptimekuma

  uptimekuma:
    image: louislam/uptime-kuma:1
    container_name: uptimekuma
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - uptimekuma_data:/app/data
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
  uptimekuma_data:
